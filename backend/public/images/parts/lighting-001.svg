<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  
  <defs>
    <filter id="lensGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <defs>
    <linearGradient id="bgGradlighting-001" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="borderGradlighting-001" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ff6b35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bgGradlighting-001)"/>
  <rect x="4" y="4" width="392" height="292" rx="8" ry="8" fill="none" stroke="url(#borderGradlighting-001)" stroke-width="2"/>

  <g transform="translate(0, -10)">
    <ellipse cx="200" cy="150" rx="130" ry="90" fill="#1a1a2e" stroke="#333" stroke-width="3"/>
    <ellipse cx="200" cy="150" rx="95" ry="60" fill="#e8f4ff" stroke="#88bbee" stroke-width="2" filter="url(#lensGlow)"/>
    <circle cx="160" cy="145" r="25" fill="#fffacd" />
    <circle cx="240" cy="145" r="25" fill="#fffacd" />
    <text x="200" y="150" text-anchor="middle" fill="#ff6b35" font-family="Orbitron, Arial, sans-serif" font-size="20" font-weight="bold" style="text-shadow: 0 0 10px #ff6b3544;">LED</text>
  </g>

  <rect x="0" y="258" width="400" height="42" fill="#0d0d15" opacity="0.95"/>
  <line x1="0" y1="258" x2="400" y2="258" stroke="#ff6b35" stroke-width="1" opacity="0.5"/>
  <text x="20" y="278" fill="#8d99ae" font-family="Arial, sans-serif" font-size="10" opacity="0.7">灯组照明</text>
  <text x="380" y="278" fill="#8d99ae" font-family="Orbitron, Arial, sans-serif" font-size="10" text-anchor="end" opacity="0.7">XCF-180</text>
  <text x="200" y="283" text-anchor="middle" fill="#e2e2e2" font-family="Orbitron, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">LED透镜大灯总成</text>
  <text x="200" y="296" text-anchor="middle" fill="#ff6b35" font-family="Orbitron, Arial, sans-serif" font-size="8" opacity="0.8">LIGHTING-001</text>
</svg>